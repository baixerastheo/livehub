name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test-backend:
    name: Test backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter backend test:cov
        env:
          CI: true

  test-frontend:
    name: Test frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter frontend test:cov
        env:
          CI: true

  release:
    name: Build & Release
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build backend
        run: pnpm --filter backend build
        env:
          CI: true

      - name: Build frontend
        run: pnpm --filter frontend build
        env:
          CI: true

      - name: Zip builds
        run: |
          zip -r backend-${{ github.ref_name }}.zip backend/dist/
          zip -r frontend-${{ github.ref_name }}.zip frontend/.next/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            backend-${{ github.ref_name }}.zip
            frontend-${{ github.ref_name }}.zip
