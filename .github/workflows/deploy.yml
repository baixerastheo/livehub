name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    name: Build & Push images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push backend
        run: |
          docker build -t app-livehub-backend -f ./backend/Dockerfile .
          docker tag app-livehub-backend:latest 881908114928.dkr.ecr.eu-west-3.amazonaws.com/app-livehub-backend:latest
          docker push 881908114928.dkr.ecr.eu-west-3.amazonaws.com/app-livehub-backend:latest

      - name: Build & Push frontend
        run: |
          docker build -t app-livehub-frontend -f ./frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_AUTH_URL=${{ secrets.NEXT_PUBLIC_AUTH_URL }} \
            --build-arg NEXT_PUBLIC_BACKEND_WS_URL=${{ secrets.NEXT_PUBLIC_BACKEND_WS_URL }} \
            .
          docker tag app-livehub-frontend:latest 881908114928.dkr.ecr.eu-west-3.amazonaws.com/app-livehub-frontend:latest
          docker push 881908114928.dkr.ecr.eu-west-3.amazonaws.com/app-livehub-frontend:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Créer les .env
            mkdir -p ~/Livehub/backend ~/Livehub/frontend

            cat > ~/Livehub/backend/.env << 'EOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DIRECT_URL=${{ secrets.DIRECT_URL }}
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            ROBLOX_CLIENT_ID=${{ secrets.ROBLOX_CLIENT_ID }}
            ROBLOX_CLIENT_SECRET=${{ secrets.ROBLOX_CLIENT_SECRET }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
            BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}
            FRONTEND_ORIGIN=${{ secrets.FRONTEND_ORIGIN }}
            PORT=${{ secrets.PORT }}
            KLIPY_API_KEY=${{ secrets.KLIPY_API_KEY }}
            BASE_URL_KLIPY=${{ secrets.BASE_URL_KLIPY }}
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            LIVEKIT_URL=${{ secrets.LIVEKIT_URL }}
            LIVEKIT_API_KEY=${{ secrets.LIVEKIT_API_KEY }}
            LIVEKIT_API_SECRET=${{ secrets.LIVEKIT_API_SECRET }}
            EOF

            cat > ~/Livehub/frontend/.env << 'EOF'
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_AUTH_URL=${{ secrets.NEXT_PUBLIC_AUTH_URL }}
            NEXT_PUBLIC_BACKEND_WS_URL=${{ secrets.NEXT_PUBLIC_BACKEND_WS_URL }}
            EOF

            # Login ECR
            aws ecr get-login-password --region eu-west-3 | docker login --username AWS --password-stdin 881908114928.dkr.ecr.eu-west-3.amazonaws.com

            # Pull et restart
            cd ~/Livehub
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml up -d