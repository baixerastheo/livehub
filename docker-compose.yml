services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: backend/.env
    environment:
      FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - "4001:4001"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
